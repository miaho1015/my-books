<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mia's 書庫 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #141210;
    --bg2: #1e1a16;
    --bg3: #2a2420;
    --text: #f0e8dc;
    --text-muted: #8a7a6a;
    --accent: #c9923a;
    --accent2: #e8b86d;
    --accent-dim: rgba(201,146,58,0.15);
    --border: rgba(201,146,58,0.2);
    --card-bg: #1e1a16;
    --card-hover: #252018;
    --tag-bg: rgba(201,146,58,0.12);
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: relative;
    padding: 60px 48px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(201,146,58,0.05) 0%, transparent 100%);
    z-index: 1;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-area h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  .logo-area h1 em {
    font-style: italic;
    color: var(--accent2);
  }

  .logo-area p {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stats-bar {
    display: flex;
    gap: 32px;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--accent2);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ===== CONTROLS ===== */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(20,18,16,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px;
  }

  .controls-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  /* Search */
  .search-wrap {
    position: relative;
    flex: 0 0 260px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 14px;
    height: 14px;
  }

  input[type="search"] {
    width: 100%;
    padding: 9px 12px 9px 36px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus {
    border-color: var(--accent);
  }

  input[type="search"]::placeholder { color: var(--text-muted); }

  /* Filter tags */
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #141210;
    font-weight: 500;
  }

  /* Status filter */
  .status-filter {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  .status-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .status-btn[data-status="全部"] { color: var(--accent); border-color: rgba(201,146,58,0.3); }
  .status-btn[data-status="待讀"] { color: var(--text-muted); }
  .status-btn[data-status="閱讀中"] { color: #6aade0; border-color: rgba(106,173,224,0.3); }
  .status-btn[data-status="已讀完"] { color: #6ac08a; border-color: rgba(106,192,138,0.3); }

  .status-btn.active[data-status="全部"] { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .status-btn.active[data-status="待讀"] { background: var(--text-muted); color: var(--bg); border-color: var(--text-muted); }
  .status-btn.active[data-status="閱讀中"] { background: #6aade0; color: var(--bg); border-color: #6aade0; }
  .status-btn.active[data-status="已讀完"] { background: #6ac08a; color: var(--bg); border-color: #6ac08a; }

  /* ===== RESULT COUNT ===== */
  .result-info {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 48px 0;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-info span { color: var(--accent2); }

  .sort-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }


  /* ===== GRID ===== */
  .grid-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 48px 80px;
    position: relative;
    z-index: 1;
  }

  .books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
  }

  /* ===== BOOK CARD ===== */
  .book-card {
    position: relative;
    cursor: pointer;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.04);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .book-card:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--accent);
    border-color: var(--accent);
    z-index: 10;
  }

  .book-cover-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    overflow: hidden;
    background: var(--bg3);
  }

  .book-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .book-card:hover .book-cover {
    transform: scale(1.05);
  }

  /* Placeholder when no image */
  .book-cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: linear-gradient(135deg, var(--bg3), var(--bg2));
    text-align: center;
  }

  .placeholder-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    line-height: 1.4;
    color: var(--text-muted);
    font-weight: 400;
    word-break: break-all;
  }

  /* Overlay on hover */
  .book-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, rgba(20,18,16,0.98) 0%, rgba(20,18,16,0.7) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px;
  }

  .book-card:hover .book-overlay {
    opacity: 1;
  }

  .overlay-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .overlay-author {
    font-size: 11px;
    color: var(--accent2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Status badge */
  .status-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .book-card:hover .status-badge { opacity: 1; }

  .status-badge.待讀 { background: rgba(138,122,106,0.8); color: #fff; }
  .status-badge.閱讀中 { background: rgba(106,173,224,0.85); color: #fff; }
  .status-badge.已讀完 { background: rgba(106,192,138,0.85); color: #fff; }

  /* Type tag */
  .book-type {
    padding: 8px 10px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }

  .type-tag {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    background: var(--tag-bg);
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
    border: 1px solid rgba(201,146,58,0.1);
  }

  .book-num {
    font-size: 10px;
    color: rgba(138,122,106,0.4);
    font-family: 'Cormorant Garamond', serif;
  }

  /* ===== NO RESULTS ===== */
  .no-results {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-style: italic;
    display: none;
    grid-column: 1 / -1;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    max-width: 540px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    transform: scale(0.95);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal {
    transform: scale(1);
  }

  .modal-cover-wrap {
    width: 100%;
    height: 280px;
    overflow: hidden;
    border-radius: 12px 12px 0 0;
    position: relative;
  }

  .modal-cover-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  .modal-cover-gradient {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 60%;
    background: linear-gradient(transparent, var(--bg2));
  }

  .modal-body {
    padding: 24px 28px 28px;
  }

  .modal-type {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 6px;
  }

  .modal-author {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .modal-dates {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .modal-dates > span { display: none; }
  .modal-dates > span.visible { display: block; }

  .modal-dates .date-label {
    color: var(--accent);
    font-weight: 500;
    margin-right: 6px;
  }

  .modal-rating {
    display: none;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .modal-rating.visible { display: flex; }

  .rating-label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .stars {
    display: flex;
    gap: 2px;
  }

  .star {
    font-size: 26px;
    color: rgba(138,122,106,0.25);
    cursor: pointer;
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
    user-select: none;
  }

  .star.filled { color: var(--accent2); }
  .star.hover { color: var(--accent2); }

  .card-stars {
    display: flex;
    gap: 1px;
    font-size: 10px;
    line-height: 1;
  }

  .card-star { color: rgba(138,122,106,0.25); }
  .card-star.filled { color: var(--accent2); }

  /* ===== NOTES ===== */
  .modal-notes {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }
  .modal-notes.visible { display: flex; }

  .notes-label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .notes-textarea {
    width: 100%;
    min-height: 100px;
    max-height: 240px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    line-height: 1.7;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-textarea::placeholder { color: rgba(138,122,106,0.4); }
  .notes-textarea:focus { border-color: var(--accent); }

  .notes-saved {
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.3s;
    text-align: right;
  }
  .notes-saved.show { opacity: 1; }

  .card-note-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  /* ===== OBSIDIAN SYNC ===== */
  .obs-sync-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    padding: 10px;
    border-radius: var(--radius);
    border: 1px solid rgba(138,108,220,0.35);
    background: rgba(138,108,220,0.08);
    color: #a78fd8;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .obs-sync-btn:hover { border-color: #a78fd8; background: rgba(138,108,220,0.15); }
  .obs-sync-btn:disabled { opacity: 0.45; cursor: default; }
  .obs-sync-btn.syncing { color: var(--text-muted); border-color: var(--border); background: none; }
  .obs-sync-btn.success { border-color: #6ac08a; background: rgba(106,192,138,0.1); color: #6ac08a; }
  .obs-sync-btn.error { border-color: #e07070; background: rgba(224,112,112,0.1); color: #e07070; }

  /* Settings panel */
  .obs-settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .obs-settings-overlay.open { display: flex; }

  .obs-settings-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 480px;
    max-width: 90vw;
    box-shadow: var(--shadow);
  }
  .obs-settings-panel h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .obs-settings-panel p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .obs-settings-panel label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .obs-settings-panel input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', monospace;
    padding: 10px 12px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .obs-settings-panel input:focus { border-color: #a78fd8; }
  .obs-settings-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .obs-settings-save {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius);
    border: none;
    background: #a78fd8;
    color: #141210;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }
  .obs-settings-save:hover { background: #b9a3e3; }
  .obs-settings-cancel {
    padding: 10px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .obs-settings-cancel:hover { border-color: var(--text-muted); color: var(--text); }

  .obs-icon-btn {
    position: fixed;
    top: 20px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: #a78fd8;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 100;
  }
  .obs-icon-btn:hover { border-color: #a78fd8; background: rgba(138,108,220,0.12); }
  .obs-icon-btn.connected { border-color: #6ac08a; color: #6ac08a; }

  @media (max-width: 768px) {
    .obs-icon-btn { top: 14px; right: 16px; width: 40px; height: 40px; font-size: 18px; }
  }

  .modal-format {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .format-btn {
    flex: 1;
    padding: 8px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .format-btn:hover { border-color: var(--accent); color: var(--accent); }
  .format-btn.active[data-f="實體書"] { background: rgba(201,146,58,0.15); border-color: var(--accent); color: var(--accent2); }
  .format-btn.active[data-f="電子書"] { background: rgba(106,173,224,0.12); border-color: #6aade0; color: #6aade0; }

  .card-format {
    position: absolute;
    bottom: 8px;
    right: 8px;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    pointer-events: none;
  }
  .card-format.實體書 {
    background: rgba(201,146,58,0.85);
    color: #141210;
  }
  .card-format.電子書 {
    background: rgba(106,173,224,0.85);
    color: #0a1520;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;

// Owner mode: only on localhost
const isOwner = ['localhost', '127.0.0.1', ''].includes(location.hostname);

// Status storage (LocalStorage)
const STORAGE_KEY = 'mia_books_status';
let _storage = null;
try { _storage = localStorage; } catch(e) {}
function storageGet() { try { return JSON.parse((_storage && _storage.getItem(STORAGE_KEY)) || '{}'); } catch(e) { return {}; } }
function storageSet(data) { try { if (_storage) _storage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {} }
let statusMap = storageGet();

function getStatus(id) {
  const entry = statusMap[id];
  if (!entry) return '待讀';
  return typeof entry === 'string' ? entry : entry.status;
}

function getRating(id) {
  const entry = statusMap[id];
  if (!entry || typeof entry === 'string') return 0;
  return entry.rating || 0;
}

function updateStars(rating, hoverVal) {
  const val = hoverVal !== undefined ? hoverVal : rating;
  document.querySelectorAll('#modal-stars .star').forEach(star => {
    const v = parseInt(star.dataset.v);
    star.classList.toggle('filled', hoverVal === undefined && v <= rating);
    star.classList.toggle('hover', hoverVal !== undefined && v <= val);
  });
}

function initStarEvents() {
  const starsEl = document.getElementById('modal-stars');
  starsEl.querySelectorAll('.star').forEach(star => {
    star.addEventListener('mouseenter', () => updateStars(getRating(currentModal.id), parseInt(star.dataset.v)));
    star.addEventListener('mouseleave', () => updateStars(getRating(currentModal.id)));
    star.addEventListener('click', () => {
      if (!currentModal) return;
      const v = parseInt(star.dataset.v);
      const entry = statusMap[currentModal.id];
      if (entry && typeof entry === 'object') {
        entry.rating = v;
        storageSet(statusMap);
        updateStars(v);
      }
    });
  });
}

function getTimestamps(id) {
  const entry = statusMap[id];
  if (!entry || typeof entry === 'string') return {};
  return { startedAt: entry.startedAt || null, finishedAt: entry.finishedAt || null };
}

function formatDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function saveStatus(id, s) {
  const prev = statusMap[id];
  const prevStatus = typeof prev === 'string' ? prev : (prev && prev.status) || '待讀';
  const prevTimestamps = typeof prev === 'object' && prev ? { startedAt: prev.startedAt, finishedAt: prev.finishedAt } : {};
  const now = new Date().toISOString();
  const entry = { status: s };
  if (s === '待讀') {
    // 清除所有時間記錄
  } else if (s === '閱讀中') {
    entry.startedAt = prevStatus !== '閱讀中' ? now : prevTimestamps.startedAt;
    if (prevTimestamps.finishedAt) entry.finishedAt = prevTimestamps.finishedAt;
  } else if (s === '已讀完') {
    if (prevTimestamps.startedAt) entry.startedAt = prevTimestamps.startedAt;
    entry.finishedAt = prevStatus !== '已讀完' ? now : prevTimestamps.finishedAt;
  }
  statusMap[id] = entry;
  storageSet(statusMap);
  updateStats();
}

// State
let currentCat = '全部';
let currentStatus = '全部';
let currentSearch = '';
let currentModal = null;
let currentSort = 'default'; // 'default' | 'stroke'

function toggleSort() {
  currentSort = currentSort === 'default' ? 'stroke' : 'default';
  const btn = document.getElementById('sort-btn');
  if (currentSort === 'stroke') {
    btn.textContent = '↕ 筆畫排列';
    btn.classList.add('active');
  } else {
    btn.textContent = '↕ 原始順序';
    btn.classList.remove('active');
  }
  render();
}

// Render
function render() {
  const grid = document.getElementById('books-grid');
  const filtered = books.filter(b => {
    const s = getStatus(b.id);
    const matchCat = currentCat === '全部' || b.type === currentCat;
    const matchStatus = currentStatus === '全部' || s === currentStatus;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
    return matchCat && matchStatus && matchSearch;
  });

  if (currentSort === 'stroke') {
    filtered.sort((a, b) => a.title.localeCompare(b.title, 'zh-TW', { sensitivity: 'variant' }));
  }

  document.getElementById('showing-count').textContent = filtered.length;

  grid.innerHTML = '';

  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'no-results';
    empty.style.display = 'block';
    empty.textContent = '沒有找到符合條件的書籍';
    grid.appendChild(empty);
    return;
  }

  filtered.forEach((b, i) => {
    const s = getStatus(b.id);
    const card = document.createElement('div');
    card.className = 'book-card';
    card.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;

    const imgPath = `covers/${encodeURIComponent(b.cover)}`;

    card.innerHTML = `
      <div class="book-cover-wrap">
        <img class="book-cover" src="${imgPath}" alt="${b.short}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="book-cover-placeholder" style="display:none">
          <span class="placeholder-title">${b.short}</span>
        </div>
        <div class="book-overlay">
          <div class="overlay-title">${b.title}</div>
          ${b.author ? `<div class="overlay-author">${b.author}</div>` : ''}
        </div>
        ${isOwner ? `<div class="status-badge ${s}">${s}</div>` : ''}
        ${isOwner && getFormat(b.id) ? `<div class="card-format ${getFormat(b.id)}">${getFormat(b.id)}</div>` : ''}
      </div>
      <div class="book-type">
        <span class="type-tag">${b.type}</span>
        ${getRating(b.id) > 0 ? `<span class="card-stars">${[1,2,3,4,5].map(v => `<span class="card-star${v <= getRating(b.id) ? ' filled' : ''}">★</span>`).join('')}</span>` : `<span class="book-num">${b.id}</span>`}
        ${getNotes(b.id) ? `<span class="card-note-dot" title="有閱讀心得"></span>` : ''}
      </div>
    `;

    card.addEventListener('click', () => openModal(b));
    grid.appendChild(card);
  });
}

function updateStats() {
  const total = books.length;
  const reading = books.filter(b => getStatus(b.id) === '閱讀中').length;
  const done = books.filter(b => getStatus(b.id) === '已讀完').length;
  document.getElementById('total-count').textContent = total;
  document.getElementById('reading-count').textContent = reading;
  document.getElementById('done-count').textContent = done;
}

// Modal
function openModal(b) {
  currentModal = b;
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-img').src = `covers/${encodeURIComponent(b.cover)}`;
  document.getElementById('modal-img').alt = b.short;
  document.getElementById('modal-type').textContent = b.type;
  document.getElementById('modal-title').textContent = b.title;
  document.getElementById('modal-author').textContent = b.author || '作者未記錄';

  // Update status buttons
  const s = getStatus(b.id);
  document.querySelectorAll('.status-select-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.s === s);
  });

  // Owner-only sections
  document.getElementById('modal-actions').style.display = isOwner ? '' : 'none';
  document.getElementById('modal-format').style.display = isOwner ? '' : 'none';
  if (isOwner) updateFormatBtns(getFormat(b.id));

  if (isOwner) {
    // Update date display
    const ts = getTimestamps(b.id);
    const startedEl = document.getElementById('modal-started');
    const finishedEl = document.getElementById('modal-finished');
    document.getElementById('modal-started-val').textContent = formatDateTime(ts.startedAt);
    document.getElementById('modal-finished-val').textContent = formatDateTime(ts.finishedAt);
    startedEl.classList.toggle('visible', !!ts.startedAt);
    finishedEl.classList.toggle('visible', !!ts.finishedAt);

    // Update rating
    const ratingEl = document.getElementById('modal-rating');
    ratingEl.classList.toggle('visible', s === '已讀完');
    updateStars(getRating(b.id));

    // Update notes
    const notesEl = document.getElementById('modal-notes');
    const textarea = document.getElementById('notes-textarea');
    notesEl.classList.toggle('visible', s === '閱讀中' || s === '已讀完');
    textarea.value = getNotes(b.id);
    document.getElementById('notes-saved').classList.remove('show');
  } else {
    document.getElementById('modal-dates').style.display = 'none';
    document.getElementById('modal-rating').classList.remove('visible');
    document.getElementById('modal-notes').classList.remove('visible');
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function setStatus(btn) {
  if (!currentModal) return;
  const s = btn.dataset.s;
  saveStatus(currentModal.id, s);
  document.querySelectorAll('.status-select-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.s === s);
  });
  // Update badge in grid
  render();
  // Keep modal open, re-open after render
  openModal(currentModal);
}

// Notes
function getFormat(id) {
  const entry = statusMap[id];
  if (!entry || typeof entry === 'string') return null;
  return entry.format || null;
}

function setFormat(btn) {
  if (!currentModal) return;
  const f = btn.dataset.f;
  const entry = statusMap[currentModal.id];
  if (entry && typeof entry === 'object') {
    // Toggle off if already active
    entry.format = entry.format === f ? null : f;
    storageSet(statusMap);
  }
  updateFormatBtns(getFormat(currentModal.id));
  render();
}

function updateFormatBtns(format) {
  document.querySelectorAll('.format-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.f === format);
  });
}

function getNotes(id) {
  const entry = statusMap[id];
  if (!entry || typeof entry === 'string') return '';
  return entry.notes || '';
}

let _notesSaveTimer = null;
function initNotesEvents() {
  const textarea = document.getElementById('notes-textarea');
  const savedEl = document.getElementById('notes-saved');
  textarea.addEventListener('input', () => {
    clearTimeout(_notesSaveTimer);
    _notesSaveTimer = setTimeout(() => {
      if (!currentModal) return;
      const entry = statusMap[currentModal.id];
      if (entry && typeof entry === 'object') {
        entry.notes = textarea.value;
        storageSet(statusMap);
        savedEl.classList.add('show');
        setTimeout(() => savedEl.classList.remove('show'), 1800);
        // Re-render card in background to update dot indicator
        render();
      }
    }, 600);
  });
}

// ===== OBSIDIAN INTEGRATION =====
const OBS_KEY = 'mia_obs_settings';

function getObsSettings() {
  try { return JSON.parse(localStorage.getItem(OBS_KEY) || '{}'); } catch(e) { return {}; }
}

function openObsSettings() {
  const s = getObsSettings();
  document.getElementById('obs-api-key-input').value = s.apiKey || '';
  document.getElementById('obs-notes-path-input').value = s.notesPath || 'Books/心得';
  document.getElementById('obs-settings-overlay').classList.add('open');
}

function closeObsSettings(e) {
  if (e.target === document.getElementById('obs-settings-overlay')) closeObsSettingsBtn();
}

function closeObsSettingsBtn() {
  document.getElementById('obs-settings-overlay').classList.remove('open');
}

function saveObsSettings() {
  const apiKey = document.getElementById('obs-api-key-input').value.trim();
  const notesPath = document.getElementById('obs-notes-path-input').value.trim() || 'Books/心得';
  try { localStorage.setItem(OBS_KEY, JSON.stringify({ apiKey, notesPath })); } catch(e) {}
  closeObsSettingsBtn();
  updateObsIconState();
}

function updateObsIconState() {
  const btn = document.getElementById('obs-icon-btn');
  if (!isOwner) return;
  btn.style.display = '';
  const s = getObsSettings();
  btn.classList.toggle('connected', !!s.apiKey);
}

async function syncToObsidian() {
  if (!currentModal) return;
  const s = getObsSettings();
  if (!s.apiKey) {
    openObsSettings();
    return;
  }

  const b = currentModal;
  const btn = document.getElementById('obs-sync-btn');
  const labelEl = document.getElementById('obs-sync-label');
  const iconEl = document.getElementById('obs-sync-icon');

  // Build note content
  const status = getStatus(b.id);
  const ts = getTimestamps(b.id);
  const rating = getRating(b.id);
  const notes = getNotes(b.id);
  const stars = rating > 0 ? '⭐'.repeat(rating) : '尚未評分';
  const startedStr = ts.startedAt ? formatDateTime(ts.startedAt) : '—';
  const finishedStr = ts.finishedAt ? formatDateTime(ts.finishedAt) : '—';

  const content = `# ${b.title}\n\n**作者**：${b.author || '未記錄'}\n**類型**：${b.type}\n**狀態**：${status}\n**開始閱讀**：${startedStr}\n**讀完時間**：${finishedStr}\n**評分**：${stars}\n\n---\n\n## 閱讀心得\n\n${notes || '（尚無心得）'}\n`;

  const notesPath = (s.notesPath || 'Books/心得').replace(/\/$/, '');
  const fileName = `${b.title.replace(/[\\/:*?"<>|]/g, '_')}.md`;
  const filePath = `${notesPath}/${fileName}`;

  // UI: syncing state
  btn.classList.remove('success', 'error');
  btn.classList.add('syncing');
  btn.disabled = true;
  iconEl.textContent = '⏳';
  labelEl.textContent = '同步中…';

  try {
    const res = await fetch(`http://localhost:27123/vault/${encodeURIComponent(filePath)}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${s.apiKey}`,
        'Content-Type': 'text/markdown',
      },
      body: content,
    });

    btn.classList.remove('syncing');
    btn.disabled = false;

    if (res.ok || res.status === 204) {
      btn.classList.add('success');
      iconEl.textContent = '✓';
      labelEl.textContent = '已同步到 Obsidian';
      setTimeout(() => {
        btn.classList.remove('success');
        iconEl.textContent = '🔮';
        labelEl.textContent = '同步到 Obsidian';
      }, 2500);
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch(err) {
    btn.classList.remove('syncing');
    btn.disabled = false;
    btn.classList.add('error');
    iconEl.textContent = '✕';
    labelEl.textContent = err.message.includes('Failed to fetch') ? '無法連線，請確認 Obsidian 開啟中' : `錯誤：${err.message}`;
    setTimeout(() => {
      btn.classList.remove('error');
      iconEl.textContent = '🔮';
      labelEl.textContent = '同步到 Obsidian';
    }, 4000);
  }
}

// ESC to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModalBtn();
    closeObsSettingsBtn();
  }
});

// Init
updateStats();
render();
initStarEvents();
initNotesEvents();
updateObsIconState();
</script>
</body>
</html>
